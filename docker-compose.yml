# Dev / lokalnie: osobna nazwa projektu i porty hosta, żeby nie kolidować z innymi repozytoriami.
# Produkcja: docker compose -f docker-compose.yml -f docker-compose.prod.yml nadpisuje `name`.
name: szczypta-smaku-local

services:
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: npx prisma db seed
    depends_on:
      - postgres
    networks:
      - szczypta-smaku
    profiles:
      - tools   # optional: only start with docker compose --profile tools run seed
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - szczypta-smaku
  backend:
    image: szczypta-smaku-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "25144:25044"
    environment:
      # W kontenerze zostaje 25044 (mapowanie host 25144 → 25044). Lokalne `npm run dev` używa PORT z .env (25144).
      - PORT=25044
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules  # zachowaj node_modules z obrazu (zawiera dotenv itd.)
      - uploads_data:/app/uploads
    networks:
      - szczypta-smaku
    depends_on:
      - postgres
  catering:
    image: szczypta-smaku-catering
    build:
      context: ./catering
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:25044
    volumes:
      - ./catering:/app
      - /app/node_modules # wlasny node_modules
    networks:
      - szczypta-smaku
    depends_on:
      - backend
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"   # HTTP - wymagany dla weryfikacji Let's Encrypt
      - "443:443" # HTTPS
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data      # Przechowuje certyfikaty SSL
      - caddy_config:/config  # Konfiguracja Caddy
    networks:
      - szczypta-smaku
    depends_on:
      catering:
        condition: service_started
      backend:
        condition: service_started

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
  uploads_data:
networks:
  szczypta-smaku:
    driver: bridge